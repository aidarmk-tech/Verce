<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0e17">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GroupChat">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192x192.png">
<title>GroupChat</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0e17;
    --bg-secondary: #111827;
    --bg-tertiary: #1a2235;
    --bg-hover: #1e2a42;
    --accent: #3b82f6;
    --accent-glow: rgba(59,130,246,0.25);
    --accent-light: #60a5fa;
    --accent-soft: rgba(59,130,246,0.12);
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --border: rgba(255,255,255,0.06);
    --border-light: rgba(255,255,255,0.1);
    --success: #22c55e;
    --warning: #f59e0b;
    --danger: #ef4444;
    --msg-own: linear-gradient(135deg, #1e3a5f 0%, #1a2f4d 100%);
    --msg-other: #1a2235;
    --radius: 14px;
    --radius-sm: 10px;
    --radius-msg: 18px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -webkit-text-size-adjust: 100%;
    overscroll-behavior: none;
  }

  /* ===== APP LAYOUT ===== */
  .app {
    display: flex;
    height: 100vh;
    height: 100dvh;
    padding-top: var(--safe-top);
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width: 340px;
    min-width: 340px;
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
  }

  .sidebar-header {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    background: linear-gradient(180deg, rgba(59,130,246,0.06) 0%, transparent 100%);
  }

  .sidebar-header .logo {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: linear-gradient(135deg, #3b82f6 0%, #6366f1 50%, #8b5cf6 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 17px;
    letter-spacing: -0.5px;
    box-shadow: 0 4px 20px var(--accent-glow);
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  .sidebar-header .logo::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%);
    border-radius: inherit;
  }

  .sidebar-header .group-info { flex: 1; min-width: 0; }

  .sidebar-header .group-name {
    font-weight: 800;
    font-size: 16px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: -0.3px;
  }

  .sidebar-header .group-meta {
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 2px;
  }

  .online-dot {
    width: 7px;
    height: 7px;
    background: var(--success);
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(34,197,94,0.5);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .topics-label {
    padding: 12px 20px 6px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }

  .topics-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 10px 10px;
    -webkit-overflow-scrolling: touch;
  }

  .topic-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    user-select: none;
  }

  .topic-item:active { transform: scale(0.98); }
  .topic-item:hover { background: var(--bg-hover); }

  .topic-item.active {
    background: var(--accent-soft);
  }

  .topic-item.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 8px;
    bottom: 8px;
    width: 3px;
    background: var(--accent);
    border-radius: 0 3px 3px 0;
  }

  .topic-icon {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    background: var(--bg-tertiary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 19px;
    flex-shrink: 0;
    transition: background 0.15s;
  }

  .topic-item.active .topic-icon {
    background: rgba(59,130,246,0.18);
  }

  .topic-content { flex: 1; min-width: 0; }

  .topic-name {
    font-weight: 700;
    font-size: 14.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .topic-preview {
    font-size: 12.5px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }

  .topic-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    flex-shrink: 0;
  }

  .topic-time {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .topic-unread {
    background: var(--accent);
    color: white;
    font-size: 11px;
    font-weight: 700;
    min-width: 22px;
    height: 22px;
    border-radius: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 7px;
    box-shadow: 0 2px 8px var(--accent-glow);
  }

  .sidebar-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    padding-bottom: calc(12px + var(--safe-bottom));
  }

  .user-avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    flex-shrink: 0;
  }

  .user-name {
    font-size: 13px;
    font-weight: 600;
    flex: 1;
  }

  .user-status {
    font-size: 11px;
    color: var(--success);
  }

  /* ===== CHAT AREA ===== */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    position: relative;
  }

  .chat-header {
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg-secondary);
    z-index: 10;
    min-height: 56px;
  }

  .chat-header .back-btn {
    display: none;
    width: 38px;
    height: 38px;
    border: none;
    background: var(--bg-tertiary);
    color: var(--text-primary);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 20px;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }

  .back-btn:active { background: var(--bg-hover); }

  .chat-topic-icon { font-size: 24px; }

  .chat-topic-info { flex: 1; }
  .chat-topic-name { font-weight: 800; font-size: 15px; letter-spacing: -0.2px; }
  .chat-topic-members { font-size: 12px; color: var(--text-muted); }

  .chat-actions {
    display: flex;
    gap: 4px;
  }

  .chat-actions button {
    width: 38px;
    height: 38px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .chat-actions button:hover { background: var(--bg-tertiary); color: var(--text-primary); }

  /* ===== MESSAGES ===== */
  .messages-container {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    -webkit-overflow-scrolling: touch;
    background:
      radial-gradient(ellipse at 15% 85%, rgba(59,130,246,0.03) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 15%, rgba(99,102,241,0.02) 0%, transparent 50%),
      var(--bg-primary);
  }

  .msg-date-divider {
    text-align: center;
    padding: 14px 0 10px;
  }

  .msg-date-divider span {
    background: var(--bg-tertiary);
    color: var(--text-muted);
    font-size: 11.5px;
    font-weight: 700;
    padding: 5px 16px;
    border-radius: 20px;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }

  .message {
    display: flex;
    gap: 8px;
    max-width: 78%;
    animation: msgIn 0.2s cubic-bezier(0.22, 1, 0.36, 1);
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .message.own {
    align-self: flex-end;
    flex-direction: row-reverse;
  }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 12px;
    flex-shrink: 0;
    align-self: flex-end;
    margin-bottom: 2px;
  }

  .message.own .msg-avatar { display: none; }

  .msg-bubble {
    padding: 9px 14px;
    border-radius: var(--radius-msg);
    position: relative;
    word-wrap: break-word;
    overflow-wrap: break-word;
    line-height: 1.45;
    font-size: 14.5px;
    min-width: 60px;
  }

  .message:not(.own) .msg-bubble {
    background: var(--msg-other);
    border-bottom-left-radius: 6px;
  }

  .message.own .msg-bubble {
    background: var(--msg-own);
    border-bottom-right-radius: 6px;
    box-shadow: 0 1px 4px rgba(59,130,246,0.08);
  }

  .msg-sender {
    font-size: 12px;
    font-weight: 800;
    margin-bottom: 2px;
    letter-spacing: -0.1px;
  }

  .msg-text { white-space: pre-wrap; }

  .msg-footer {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 5px;
    margin-top: 4px;
  }

  .msg-time {
    font-size: 10.5px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .msg-status {
    font-size: 12px;
    color: var(--accent-light);
  }

  .msg-image-container {
    margin: 4px 0;
    border-radius: var(--radius-sm);
    overflow: hidden;
    max-width: 300px;
    background: var(--bg-tertiary);
    position: relative;
  }

  .msg-image {
    width: 100%;
    display: block;
    border-radius: var(--radius-sm);
  }

  .msg-file {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    margin: 4px 0;
    cursor: pointer;
    transition: background 0.15s;
    min-width: 200px;
  }

  .msg-file:active { background: rgba(255,255,255,0.08); }

  .msg-file-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--accent-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .msg-file-info { flex: 1; min-width: 0; }

  .msg-file-name {
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .msg-file-size {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .msg-file-download {
    font-size: 18px;
    color: var(--accent-light);
  }

  /* ===== INPUT AREA ===== */
  .input-area {
    padding: 10px 14px;
    padding-bottom: calc(10px + var(--safe-bottom));
    border-top: 1px solid var(--border);
    background: var(--bg-secondary);
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }

  .input-btn {
    width: 40px;
    height: 40px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
    padding-bottom: 2px;
  }

  .input-btn:active { transform: scale(0.9); }
  .input-btn:hover { color: var(--text-primary); }

  .input-wrapper {
    flex: 1;
    background: var(--bg-tertiary);
    border-radius: 22px;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: flex-end;
    transition: border-color 0.2s;
    min-height: 44px;
  }

  .input-wrapper:focus-within {
    border-color: rgba(59,130,246,0.35);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.08);
  }

  .msg-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-primary);
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    padding: 10px 18px;
    resize: none;
    max-height: 120px;
    line-height: 1.4;
    -webkit-appearance: none;
  }

  .msg-input::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 44px;
    height: 44px;
    border: none;
    background: linear-gradient(135deg, var(--accent) 0%, #6366f1 100%);
    color: white;
    border-radius: 50%;
    cursor: pointer;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    box-shadow: 0 3px 14px var(--accent-glow);
  }

  .send-btn:hover {
    transform: scale(1.06);
    box-shadow: 0 5px 24px var(--accent-glow);
  }

  .send-btn:active { transform: scale(0.92); }

  /* ===== AUTH SCREEN ===== */
  .auth-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    height: 100dvh;
    padding: 20px;
    background:
      radial-gradient(ellipse at 25% 15%, rgba(59,130,246,0.1) 0%, transparent 50%),
      radial-gradient(ellipse at 75% 85%, rgba(99,102,241,0.07) 0%, transparent 50%),
      var(--bg-primary);
  }

  .auth-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border-light);
    border-radius: 24px;
    padding: 44px 36px;
    width: 400px;
    max-width: 100%;
    text-align: center;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  }

  .auth-logo {
    width: 80px;
    height: 80px;
    border-radius: 22px;
    background: linear-gradient(135deg, #3b82f6 0%, #6366f1 50%, #8b5cf6 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -1px;
    margin: 0 auto 24px;
    box-shadow: 0 10px 40px var(--accent-glow);
    position: relative;
    overflow: hidden;
  }

  .auth-logo::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.25) 0%, transparent 50%);
  }

  .auth-title {
    font-size: 26px;
    font-weight: 800;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }

  .auth-subtitle {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 32px;
    line-height: 1.6;
  }

  .auth-step-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 24px;
  }

  .step-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--bg-tertiary);
    transition: all 0.3s;
  }

  .step-dot.active {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent-glow);
    width: 24px;
    border-radius: 4px;
  }

  .auth-input {
    width: 100%;
    padding: 14px 18px;
    background: var(--bg-tertiary);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    outline: none;
    transition: all 0.2s;
    text-align: center;
    letter-spacing: 2px;
    margin-bottom: 16px;
    -webkit-appearance: none;
  }

  .auth-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
  }

  .auth-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent) 0%, #6366f1 100%);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 20px var(--accent-glow);
    letter-spacing: 0.3px;
  }

  .auth-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 28px var(--accent-glow); }
  .auth-btn:active { transform: translateY(0); }
  .auth-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .auth-error {
    color: var(--danger);
    font-size: 13px;
    margin-top: 14px;
    min-height: 20px;
    font-weight: 600;
  }

  .auth-note {
    font-size: 11.5px;
    color: var(--text-muted);
    margin-top: 24px;
    line-height: 1.6;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .auth-back {
    background: none;
    border: none;
    color: var(--accent-light);
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    cursor: pointer;
    margin-top: 12px;
    font-weight: 600;
  }

  /* ===== LOADING ===== */
  .loading-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 24px;
    background: var(--bg-primary);
  }

  .spinner {
    width: 44px;
    height: 44px;
    border: 3px solid var(--bg-tertiary);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text { color: var(--text-muted); font-size: 14px; font-weight: 600; }

  /* ===== EMPTY STATE ===== */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    gap: 16px;
    padding: 40px;
    text-align: center;
  }

  .empty-state .icon { font-size: 56px; opacity: 0.25; }
  .empty-state .text { font-size: 16px; font-weight: 600; }
  .empty-state .subtext { font-size: 13px; color: var(--text-muted); }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

  /* ===== MOBILE ===== */
  @media (max-width: 768px) {
    .sidebar {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 100%;
      min-width: unset;
      z-index: 20;
    }

    .sidebar.hidden { transform: translateX(-100%); }
    .chat-header .back-btn { display: flex; }
    .message { max-width: 88%; }

    .auth-card { padding: 36px 24px; }
    .auth-title { font-size: 22px; }
  }

  @media (min-width: 769px) {
    .sidebar { transform: none !important; }
  }

  /* ===== REPLY PREVIEW ===== */
  .reply-bar {
    padding: 8px 14px;
    background: rgba(59,130,246,0.06);
    border-top: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 0 14px;
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  }

  .reply-content { flex: 1; min-width: 0; }
  .reply-author { font-weight: 700; font-size: 12px; color: var(--accent-light); }
  .reply-text { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .reply-close {
    width: 28px; height: 28px; border: none; background: transparent;
    color: var(--text-muted); cursor: pointer; border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center; font-size: 16px;
  }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg-tertiary);
    color: var(--text-primary);
    padding: 10px 20px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    border: 1px solid var(--border-light);
    opacity: 0;
    transition: all 0.3s;
    z-index: 100;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ===== DEMO BANNER ===== */
  .demo-banner {
    background: linear-gradient(90deg, rgba(59,130,246,0.08) 0%, rgba(99,102,241,0.05) 100%);
    border-bottom: 1px solid rgba(59,130,246,0.15);
    padding: 7px 16px;
    font-size: 11.5px;
    color: var(--accent-light);
    text-align: center;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  /* ===== CONTEXT MENU ===== */
  .context-overlay {
    position: fixed;
    inset: 0;
    z-index: 50;
    background: rgba(0,0,0,0.3);
    animation: fadeIn 0.15s;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .context-menu {
    position: fixed;
    background: var(--bg-secondary);
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    padding: 6px;
    min-width: 180px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    z-index: 51;
    animation: ctxIn 0.15s cubic-bezier(0.22, 1, 0.36, 1);
  }

  @keyframes ctxIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }

  .ctx-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 13.5px;
    font-weight: 600;
    transition: background 0.1s;
    user-select: none;
  }

  .ctx-item:active { background: var(--bg-hover); }
  .ctx-item .icon { font-size: 16px; width: 20px; text-align: center; }
  .ctx-item.danger { color: var(--danger); }
</style>
</head>
<body>

<div id="root"></div>
<div class="toast" id="toast"></div>

<script>
// ===== CONFIG =====
const GROUP_ID = -338845720;
const GROUP_NAME = "Наша группа";

const USERS = [
  { id: 1, name: "Айдар", color: "#3b82f6", initials: "АЙ" },
  { id: 2, name: "Ержан", color: "#22c55e", initials: "ЕР" },
  { id: 3, name: "Марат", color: "#f59e0b", initials: "МР" },
  { id: 4, name: "Алия", color: "#ec4899", initials: "АЛ" },
  { id: 5, name: "Данияр", color: "#8b5cf6", initials: "ДН" },
  { id: 6, name: "Гульнара", color: "#14b8a6", initials: "ГН" },
  { id: 7, name: "Бауыржан", color: "#f97316", initials: "БЖ" },
  { id: 8, name: "Камила", color: "#e879f9", initials: "КМ" },
  { id: 9, name: "Тимур", color: "#06b6d4", initials: "ТМ" },
  { id: 10, name: "Сауле", color: "#84cc16", initials: "СЛ" },
];

const TOPICS = [
  { id: 1, name: "Общее", icon: "💬", preview: "Айдар: Всем привет!", unread: 3, time: "14:32" },
  { id: 2, name: "Проекты", icon: "📋", preview: "Марат: Файл обновил", unread: 0, time: "13:15" },
  { id: 3, name: "Технологии", icon: "⚡", preview: "Данияр: Смотрите статью", unread: 1, time: "12:40" },
  { id: 4, name: "Объявления", icon: "📢", preview: "Алия: Завтра собрание", unread: 0, time: "вчера" },
  { id: 5, name: "Разное", icon: "🎯", preview: "Гульнара: 😄", unread: 0, time: "вчера" },
];

const MESSAGES = {
  1: [
    { id: 1, u: 0, text: "Всем привет! Как дела?", time: "14:30", date: "Сегодня" },
    { id: 2, u: 1, text: "Привет! Всё отлично, работаем 💪", time: "14:31" },
    { id: 3, u: 3, text: "Добрый день! Напоминаю — дедлайн в пятницу", time: "14:32" },
    { id: 4, u: 2, text: "Ок, я почти закончил свою часть", time: "14:33" },
    { id: 5, u: 5, text: "Ребята, давайте созвон в 16:00?", time: "14:35" },
    { id: 6, u: 0, text: "Давайте! Zoom или Google Meet?", time: "14:36" },
    { id: 7, u: 8, text: "Мне удобнее Zoom", time: "14:37" },
  ],
  2: [
    { id: 1, u: 2, text: "Обновил файл с ТЗ, проверьте", time: "13:10", date: "Сегодня", file: { name: "ТЗ_проект_v3.docx", size: "245 КБ" } },
    { id: 2, u: 0, text: "Посмотрю сегодня вечером", time: "13:12" },
    { id: 3, u: 4, text: "Добавил комментарии к разделу 3", time: "13:15" },
  ],
  3: [
    { id: 1, u: 4, text: "Новая статья про контроллеры электроприводов — стоит почитать", time: "12:30", date: "Сегодня" },
    { id: 2, u: 0, text: "Интересно! Особенно часть про FOC управление", time: "12:35" },
    { id: 3, u: 8, text: "У меня есть реализация на STM32, могу скинуть код", time: "12:40" },
  ],
  4: [
    { id: 1, u: 3, text: "📢 Завтра собрание в 10:00, ауд. 305\nТема: итоги квартала\nПросьба не опаздывать!", time: "11:00", date: "Вчера" },
    { id: 2, u: 0, text: "Принято 👍", time: "11:05" },
    { id: 3, u: 6, text: "Буду!", time: "11:10" },
    { id: 4, u: 9, text: "Может перенесём на 11? У меня пара до 10:30", time: "11:15" },
  ],
  5: [
    { id: 1, u: 5, text: "Кто идёт на обед? 🍽", time: "12:00", date: "Вчера" },
    { id: 2, u: 7, text: "Я пас, защита курсовой", time: "12:02" },
    { id: 3, u: 9, text: "Давайте в столовую, сегодня плов 🍛", time: "12:05" },
    { id: 4, u: 5, text: "Идём! 😄", time: "12:06" },
  ],
};

// ===== STATE =====
let S = {
  screen: 'auth',
  authStep: 'phone',
  phone: '',
  activeTopic: null,
  sidebarVisible: true,
  messages: JSON.parse(JSON.stringify(MESSAGES)),
  inputText: '',
};

// ===== RENDER =====
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

function render() {
  const root = $('#root');
  if (S.screen === 'auth') { root.innerHTML = renderAuth(); bindAuth(); }
  else if (S.screen === 'loading') { root.innerHTML = renderLoading(); }
  else { root.innerHTML = renderApp(); bindApp(); scrollBottom(); }
}

function renderAuth() {
  const isPhone = S.authStep === 'phone';
  return `
    <div class="auth-screen">
      <div class="auth-card">
        <div class="auth-logo">GC</div>
        <div class="auth-title">GroupChat</div>
        <div class="auth-subtitle">${isPhone
          ? 'Приватный мессенджер<br>для вашей группы'
          : `Код отправлен в Telegram<br>на номер <b>${S.phone}</b>`}</div>
        <div class="auth-step-dots">
          <div class="step-dot ${isPhone ? 'active' : ''}"></div>
          <div class="step-dot ${!isPhone ? 'active' : ''}"></div>
        </div>
        <input class="auth-input" id="authInput"
          type="${isPhone ? 'tel' : 'text'}"
          placeholder="${isPhone ? '+7 ___ ___ __ __' : '• • • • •'}"
          value="${isPhone ? S.phone : ''}"
          maxlength="${isPhone ? 16 : 5}"
          autocomplete="${isPhone ? 'tel' : 'one-time-code'}"
          inputmode="${isPhone ? 'tel' : 'numeric'}">
        <button class="auth-btn" id="authBtn">${isPhone ? 'Далее →' : 'Войти'}</button>
        ${!isPhone ? '<button class="auth-back" id="authBack">← Изменить номер</button>' : ''}
        <div class="auth-error" id="authError"></div>
        <div class="auth-note">
          ${isPhone
            ? 'Авторизация через Telegram API.<br>Доступ только к вашей группе.'
            : 'Не получили? Проверьте «Избранное» в Telegram.'}
        </div>
      </div>
    </div>`;
}

function renderLoading() {
  return `<div class="loading-screen"><div class="spinner"></div><div class="loading-text">Подключение к группе...</div></div>`;
}

function renderApp() {
  return `
    <div class="app">
      <div class="sidebar ${S.sidebarVisible ? '' : 'hidden'}">
        <div class="sidebar-header">
          <div class="logo">GC</div>
          <div class="group-info">
            <div class="group-name">${GROUP_NAME}</div>
            <div class="group-meta"><span class="online-dot"></span>10 участников</div>
          </div>
        </div>
        <div class="topics-label">Темы</div>
        <div class="topics-list">${TOPICS.map(renderTopic).join('')}</div>
        <div class="sidebar-footer">
          <div class="user-avatar" style="background:${USERS[0].color}">${USERS[0].initials}</div>
          <div>
            <div class="user-name">${USERS[0].name}</div>
            <div class="user-status">в сети</div>
          </div>
        </div>
      </div>
      <div class="chat-area">
        <div class="demo-banner">⚡ Демо-режим · Для реального Telegram — подключите TDLib</div>
        ${S.activeTopic ? renderChat() : renderEmpty()}
      </div>
    </div>`;
}

function renderTopic(t) {
  const a = S.activeTopic === t.id ? 'active' : '';
  return `
    <div class="topic-item ${a}" data-tid="${t.id}">
      <div class="topic-icon">${t.icon}</div>
      <div class="topic-content">
        <div class="topic-name">${t.name}</div>
        <div class="topic-preview">${t.preview}</div>
      </div>
      <div class="topic-right">
        <div class="topic-time">${t.time}</div>
        ${t.unread > 0 ? `<div class="topic-unread">${t.unread}</div>` : ''}
      </div>
    </div>`;
}

function renderChat() {
  const topic = TOPICS.find(t => t.id === S.activeTopic);
  const msgs = S.messages[S.activeTopic] || [];
  return `
    <div class="chat-header">
      <button class="back-btn" id="backBtn">←</button>
      <div class="chat-topic-icon">${topic.icon}</div>
      <div class="chat-topic-info">
        <div class="chat-topic-name">${topic.name}</div>
        <div class="chat-topic-members">10 участников</div>
      </div>
      <div class="chat-actions">
        <button title="Поиск">🔍</button>
      </div>
    </div>
    <div class="messages-container" id="msgBox">${renderMsgs(msgs)}</div>
    <div class="input-area">
      <button class="input-btn" id="attachBtn" title="Вложение">📎</button>
      <div class="input-wrapper">
        <textarea class="msg-input" id="msgInput" placeholder="Сообщение..." rows="1">${esc(S.inputText)}</textarea>
      </div>
      <button class="send-btn" id="sendBtn">➤</button>
    </div>`;
}

function renderMsgs(msgs) {
  let html = '', lastDate = '';
  for (const m of msgs) {
    if (m.date && m.date !== lastDate) {
      html += `<div class="msg-date-divider"><span>${m.date}</span></div>`;
      lastDate = m.date;
    }
    const own = m.u === 0;
    const user = USERS[m.u];
    let body = '';
    if (m.file) {
      const ext = m.file.name.split('.').pop().toLowerCase();
      const icon = {doc:'📄',docx:'📄',pdf:'📕',xls:'📊',xlsx:'📊',jpg:'🖼',png:'🖼',mp4:'🎬',zip:'📦'}[ext] || '📄';
      body += `<div class="msg-file"><div class="msg-file-icon">${icon}</div><div class="msg-file-info"><div class="msg-file-name">${esc(m.file.name)}</div><div class="msg-file-size">${m.file.size}</div></div><div class="msg-file-download">⬇</div></div>`;
    }
    if (m.text) body += `<div class="msg-text">${esc(m.text)}</div>`;

    html += `
      <div class="message ${own ? 'own' : ''}" data-mid="${m.id}">
        <div class="msg-avatar" style="background:${user.color}">${user.initials}</div>
        <div class="msg-bubble">
          ${!own ? `<div class="msg-sender" style="color:${user.color}">${user.name}</div>` : ''}
          ${body}
          <div class="msg-footer">
            <span class="msg-time">${m.time}</span>
            ${own ? '<span class="msg-status">✓✓</span>' : ''}
          </div>
        </div>
      </div>`;
  }
  return html;
}

function renderEmpty() {
  return `
    <div class="empty-state">
      <div class="icon">💬</div>
      <div class="text">Выберите тему</div>
      <div class="subtext">Нажмите на тему слева, чтобы начать общение</div>
    </div>`;
}

// ===== BIND =====
function bindAuth() {
  const input = $('#authInput');
  const btn = $('#authBtn');
  const back = $('#authBack');
  if (input) setTimeout(() => input.focus(), 100);

  btn.onclick = () => {
    const val = input.value.trim();
    if (S.authStep === 'phone') {
      if (val.length >= 10) { S.phone = val; S.authStep = 'code'; render(); }
      else $('#authError').textContent = 'Введите номер телефона';
    } else {
      if (val.length >= 4) { S.screen = 'loading'; render(); setTimeout(() => { S.screen = 'app'; render(); }, 1500); }
      else $('#authError').textContent = 'Введите код из Telegram';
    }
  };

  input.onkeydown = (e) => { if (e.key === 'Enter') btn.click(); };
  if (back) back.onclick = () => { S.authStep = 'phone'; render(); };
}

function bindApp() {
  $$('.topic-item').forEach(el => {
    el.onclick = () => {
      const tid = +el.dataset.tid;
      S.activeTopic = tid;
      const t = TOPICS.find(x => x.id === tid);
      if (t) t.unread = 0;
      if (window.innerWidth <= 768) S.sidebarVisible = false;
      render();
    };
  });

  const back = $('#backBtn');
  if (back) back.onclick = () => { S.sidebarVisible = true; render(); };

  const input = $('#msgInput');
  if (input) {
    input.addEventListener('input', () => {
      S.inputText = input.value;
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });
    input.onkeydown = (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    };
  }

  const sendBtn = $('#sendBtn');
  if (sendBtn) sendBtn.onclick = send;

  const attachBtn = $('#attachBtn');
  if (attachBtn) attachBtn.onclick = () => {
    const fi = document.createElement('input');
    fi.type = 'file';
    fi.accept = 'image/*,video/*,.pdf,.doc,.docx,.xls,.xlsx,.zip,.rar';
    fi.onchange = (e) => {
      const f = e.target.files[0];
      if (!f) return;
      addMsg({
        u: 0, text: '', time: now(),
        file: { name: f.name, size: fmtSize(f.size) }
      });
      toast('Файл прикреплён');
    };
    fi.click();
  };

  // Long press on messages
  $$('.message').forEach(el => {
    let timer;
    const start = (e) => {
      timer = setTimeout(() => showCtx(el, e), 500);
    };
    const cancel = () => clearTimeout(timer);
    el.addEventListener('touchstart', start, { passive: true });
    el.addEventListener('touchend', cancel);
    el.addEventListener('touchmove', cancel);
    el.addEventListener('contextmenu', (e) => { e.preventDefault(); showCtx(el, e); });
  });
}

function send() {
  const text = S.inputText.trim();
  if (!text || !S.activeTopic) return;
  addMsg({ u: 0, text, time: now() });
  S.inputText = '';
  updateTopicPreview(`Вы: ${text.substring(0, 25)}${text.length > 25 ? '…' : ''}`);

  // Simulate reply
  if (Math.random() > 0.4) {
    setTimeout(() => {
      const replies = ["Согласен 👍","Хорошо, понял","Отлично!","Давай обсудим","Ок, сделаю","Спасибо!","Принято ✅","Интересно 🤔","Завтра поговорим","👌","Буду через 5 минут","Напишу позже"];
      const ru = 1 + Math.floor(Math.random() * 9);
      addMsg({ u: ru, text: replies[Math.floor(Math.random() * replies.length)], time: now() });
      updateTopicPreview(`${USERS[ru].name}: ${replies[0]}`);
    }, 1500 + Math.random() * 3000);
  }
}

function addMsg(data) {
  if (!S.activeTopic) return;
  const msgs = S.messages[S.activeTopic] || [];
  msgs.push({ id: Date.now(), date: 'Сегодня', ...data });
  S.messages[S.activeTopic] = msgs;
  render();
}

function updateTopicPreview(text) {
  const t = TOPICS.find(x => x.id === S.activeTopic);
  if (t) { t.preview = text; t.time = now(); }
}

// ===== CONTEXT MENU =====
function showCtx(el, e) {
  closeCtx();
  const mid = +el.dataset.mid;
  const isOwn = el.classList.contains('own');

  const overlay = document.createElement('div');
  overlay.className = 'context-overlay';
  overlay.onclick = closeCtx;

  const menu = document.createElement('div');
  menu.className = 'context-menu';
  menu.innerHTML = `
    <div class="ctx-item" data-action="reply"><span class="icon">↩</span>Ответить</div>
    <div class="ctx-item" data-action="copy"><span class="icon">📋</span>Копировать</div>
    <div class="ctx-item" data-action="forward"><span class="icon">↗</span>Переслать</div>
    ${isOwn ? '<div class="ctx-item danger" data-action="delete"><span class="icon">🗑</span>Удалить</div>' : ''}
  `;

  // Position
  const rect = el.getBoundingClientRect();
  let top = rect.top;
  let left = rect.left + rect.width / 2 - 90;
  if (left < 10) left = 10;
  if (left + 180 > window.innerWidth) left = window.innerWidth - 190;
  if (top + 200 > window.innerHeight) top = rect.top - 160;
  menu.style.top = top + 'px';
  menu.style.left = left + 'px';

  document.body.appendChild(overlay);
  document.body.appendChild(menu);

  menu.querySelectorAll('.ctx-item').forEach(item => {
    item.onclick = () => {
      const action = item.dataset.action;
      if (action === 'copy') {
        const bubble = el.querySelector('.msg-text');
        if (bubble) navigator.clipboard?.writeText(bubble.textContent).then(() => toast('Скопировано'));
      } else if (action === 'delete') {
        const msgs = S.messages[S.activeTopic];
        if (msgs) {
          S.messages[S.activeTopic] = msgs.filter(m => m.id !== mid);
          render();
          toast('Сообщение удалено');
        }
      } else if (action === 'reply') {
        toast('Ответ (скоро)');
      } else if (action === 'forward') {
        toast('Пересылка (скоро)');
      }
      closeCtx();
    };
  });
}

function closeCtx() {
  document.querySelectorAll('.context-overlay, .context-menu').forEach(e => e.remove());
}

// ===== UTILS =====
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function now() {
  return new Date().toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
}

function fmtSize(b) {
  if (b < 1024) return b + ' Б';
  if (b < 1048576) return Math.round(b / 1024) + ' КБ';
  return (b / 1048576).toFixed(1) + ' МБ';
}

function scrollBottom() {
  const box = $('#msgBox');
  if (box) requestAnimationFrame(() => box.scrollTop = box.scrollHeight);
}

function toast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ===== SERVICE WORKER =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ===== INIT =====
render();
</script>
</body>
</html>
